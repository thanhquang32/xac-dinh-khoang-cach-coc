; PlatformIO Project Configuration File
; Cup Distance Alarm — ESP32
;
; Mở bằng VSCode với extension PlatformIO IDE đã cài sẵn.
; Nạp firmware: PlatformIO icon → Upload (hoặc Ctrl+Alt+U)

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial monitor ─────────────────────────────────────────────
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ── Build flags ────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_ARCH_ESP32

; ── Upload settings ────────────────────────────────────────────
; Nếu cần ghi port tay (Windows: COM3, Linux: /dev/ttyUSB0)
; upload_port = COM3
; upload_speed = 921600

; ── Libraries (tự động tải nếu cần) ────────────────────────────
; lib_deps =
